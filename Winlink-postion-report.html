<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Winlink Position Reports • By Condition</title>
  <style>
    :root { --bg: #0f0f0f; --card: #1a1a1a; --text: #e0e0e0; --accent: #00ff9d; }
    body { margin:0; font-family: system-ui, sans-serif; background:var(--bg); color:var(--text); }
    header { background:#111; padding:1.5rem; text-align:center; border-bottom:3px solid var(--accent); }
    h1 { margin:0; color:var(--accent); }

    .controls {
      max-width:1200px; margin:20px auto; padding:0 20px;
      display:flex; gap:15px; flex-wrap:wrap; align-items:center; justify-content:center;
    }
    button { padding:12px 24px; background:var(--accent); color:black; border:none; border-radius:8px; font-weight:bold; cursor:pointer; }
    button:hover { background:#00cc7a; }
    button.red { background:#ff4444; }

    .upload-area {
      max-width:600px; margin:20px auto; padding:40px; border:3px dashed #444;
      border-radius:12px; text-align:center; cursor:pointer;
    }
    .upload-area:hover { border-color: var(--accent); }

    .columns {
      max-width:1200px; margin:0 auto; padding:20px;
      display:grid; grid-template-columns: 1fr 1fr 1fr; gap:20px;
    }
    .column { background:#111; border-radius:12px; padding:15px; min-height:300px; }
    .column-header {
      text-align:center; padding:14px; margin-bottom:15px; border-radius:8px;
      font-weight:bold; font-size:1.2rem;
    }
    .green-header { background:#004400; color:#00ff00; }
    .yellow-header { background:#664400; color:#ffdd00; }
    .red-header { background:#660000; color:#ff6666; }

    .article {
      background:var(--card); border-radius:10px; padding:16px; margin-bottom:12px;
    }
    .article-title { margin:0 0 10px 0; font-size:1.25rem; font-weight:bold; }
    .article-desc { color:#bbb; line-height:1.5; }
    .maps-link {
      display:inline-flex; align-items:center; gap:6px; background:#222; color:var(--accent);
      padding:6px 12px; border-radius:6px; text-decoration:none; font-size:0.9rem;
    }
    .empty { text-align:center; padding:40px; color:#555; font-style:italic; }
  </style>
</head>
<body>
  <header><h1>🛰️ Winlink Position Reports • By Condition (Sorted by Callsign)</h1></header>

  <div class="controls">
    <button onclick="document.getElementById('posFile').click()">📤 Upload .pos File</button>
    
  </div>

  <input type="file" id="posFile" accept=".pos,text/plain" style="display:none" onchange="handleFileUpload(event)">

  <div class="upload-area" onclick="document.getElementById('posFile').click()">
    <h2>Drop your position.pos file here</h2>
    <p>or click to select</p>
  </div>

  <div class="columns" id="columnsContainer"></div>

  <script>
    let lastFileContent = "";

    function getCondition(comment) {
      if (!comment) return "neutral";
      const trimmed = comment.trim().toUpperCase();
      if (trimmed.startsWith("GREEN")) return "green";
      if (trimmed.startsWith("YELLOW")) return "yellow";
      if (trimmed.startsWith("RED")) return "red";
      return "neutral";
    }

    function parsePositionFile(text) {
      const lines = text.split('\n');
      const reports = [];

      for (let line of lines) {
        line = line.trim();
        if (!line || !line.startsWith(';')) continue;

        const callsignMatch = line.match(/^;(\S+)/);
        if (!callsignMatch) continue;
        const callsign = callsignMatch[1].trim();

        // Extract Lat/Lon
        const latMatch = line.match(/(\d+\.\d+[NS])/);
        const lonMatch = line.match(/(\d+\.\d+[EW])/);
        let lat = null, lon = null;

        if (latMatch) {
          let s = latMatch[1].replace(/[NS]/, '');
          lat = parseFloat(s.slice(0,2) + '.' + s.slice(2));
          if (latMatch[1].includes('S')) lat = -lat;
        }
        if (lonMatch) {
          let s = lonMatch[1].replace(/[EW]/, '');
          lon = parseFloat(s.slice(0,3) + '.' + s.slice(3));
          if (lonMatch[1].includes('W')) lon = -lon;
        }

        const comment = line.split('a').slice(1).join('a').trim() || "No comment";

        reports.push({
          callsign: callsign,
          lat: lat,
          lon: lon,
          comment: comment,
          condition: getCondition(comment)
        });
      }
      return reports;
    }

    function createArticleHTML(report) {
      let mapsHTML = '';
      if (report.lat !== null && report.lon !== null) {
        mapsHTML = `<a href="https://www.google.com/maps?q=${report.lat},${report.lon}" target="_blank" class="maps-link">🗺️ Google Maps</a>`;
      }

      return `
        <div class="article">
          <div class="article-title">${report.callsign}</div>
          <div class="article-desc">${report.comment}</div>

        </div>`;
    }

    function renderReports(reports) {
      const container = document.getElementById("columnsContainer");

      // Sort by callsign A → Z in each column
      const green = reports.filter(r => r.condition === "green")
                           .sort((a, b) => a.callsign.localeCompare(b.callsign));
      const yellow = reports.filter(r => r.condition === "yellow")
                            .sort((a, b) => a.callsign.localeCompare(b.callsign));
      const red = reports.filter(r => r.condition === "red")
                         .sort((a, b) => a.callsign.localeCompare(b.callsign));

      container.innerHTML = `
        <div class="column">
          <div class="column-header green-header">✅ GREEN - NORMAL</div>
          ${green.length ? green.map(r => createArticleHTML(r)).join('') : '<div class="empty">No Green reports</div>'}
        </div>
        <div class="column">
          <div class="column-header yellow-header">⚠️ YELLOW - CAUTION</div>
          ${yellow.length ? yellow.map(r => createArticleHTML(r)).join('') : '<div class="empty">No Yellow reports</div>'}
        </div>
        <div class="column">
          <div class="column-header red-header">🚨 RED - EMERGENCY</div>
          ${red.length ? red.map(r => createArticleHTML(r)).join('') : '<div class="empty">No Red reports</div>'}
        </div>
      `;
    }

    function handleFileUpload(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(event) {
        lastFileContent = event.target.result;
        renderReports(parsePositionFile(lastFileContent));
      };
      reader.readAsText(file);
    }

    function refreshFromLastFile() {
      if (!lastFileContent) return alert("Please upload a .pos file first");
      renderReports(parsePositionFile(lastFileContent));
    }

    function clearAll() {
      if (confirm("Clear all reports?")) {
        document.getElementById("columnsContainer").innerHTML = "";
        lastFileContent = "";
      }
    }

    // Drag & Drop support
    document.addEventListener('dragover', e => e.preventDefault());
    document.addEventListener('drop', e => {
      e.preventDefault();
      const file = e.dataTransfer.files[0];
      if (file && file.name.endsWith('.pos')) {
        const reader = new FileReader();
        reader.onload = ev => {
          lastFileContent = ev.target.result;
          renderReports(parsePositionFile(lastFileContent));
        };
        reader.readAsText(file);
      }
    });
  </script>
</body>
</html>
